# Alembic config. DB URL is NOT set here -- env.py loads settings.database_url
# (+ connect_args for Neon SSL) from app.core.config at runtime.
# Keep this file ASCII-only: configparser reads it with the Windows locale codec.
[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
